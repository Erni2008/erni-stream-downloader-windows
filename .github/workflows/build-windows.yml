name: Build Windows EXE and Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Build EXE
        shell: pwsh
        run: .\build_windows.ps1

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: ERNI-Stream-Downloader-Windows
          path: dist/ERNI Stream Downloader.exe

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: ERNI-Stream-Downloader-Windows-Installer
          path: installer-output/ERNI Stream Downloader Setup.exe
